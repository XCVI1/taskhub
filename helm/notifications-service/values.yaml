replicaCount: 1

image:
  repository: danyafi/notifications-service
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8003

deployment:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

resources:
  requests:
    cpu: "50m"
    memory: "128Mi"
  limits:
    cpu: "150m"
    memory: "256Mi"

ingress:
  enabled: false

pdb:
  enabled: false

autoscaling:
  enabled: false

livenessProbe:
  httpGet:
    path: /health/live
    port: 8003
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/ready
    port: 8003
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health/live
    port: 8003
  failureThreshold: 12
  periodSeconds: 5

httpRoute:
  enabled: false

postgresql:
  auth:
    username: user
    password: password
    database: notifications_db
