replicaCount: 1

image:
  repository: danyafi/tasks-service
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8002

ingress:
  enabled: false

autoscaling:
  enabled: false

pdb:
  enabled: false
  maxUnavailable: 1

resources:
  requests:
    cpu: "50m"
    memory: "128Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"

deployment:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

livenessProbe:
  httpGet:
    path: /health/live
    port: 8002
  initialDelaySeconds: 10
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/ready
    port: 8002
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health/live
    port: 8002
  failureThreshold: 12
  periodSeconds: 5

httpRoute:
  enabled: false

postgresql:
  auth:
    username: user
    password: password
    database: tasks_db
